<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Scratch プレビュー</title>
  <style>
    body { font-family: sans-serif; padding: 24px; background: #f5f5f5; }
    h1 { margin-bottom: 16px; }
    input[type=file] { margin-bottom: 16px; display: block; }
    iframe {
      border: 2px solid #ccc;
      border-radius: 8px;
      display: block;
      background: #000;
    }
    #sw-status { font-size: 12px; color: #888; margin-bottom: 8px; }
  </style>
</head>
<body>
  <h1>Scratch プレビュー</h1>
  <div id="sw-status">Service Worker: 初期化中...</div>
  <input type="file" accept=".sb3" id="file-input">
  <iframe id="preview" width="480" height="360" allowfullscreen></iframe>

  <script>
    const VIRTUAL_PATH = '/scratch-preview-project.sb3';
    const TURBOWARP_EMBED = 'https://turbowarp.org/embed';

    const statusEl = document.getElementById('sw-status');
    const fileInput = document.getElementById('file-input');
    const iframe = document.getElementById('preview');

    async function initSW() {
      if (!('serviceWorker' in navigator)) {
        statusEl.textContent = 'Service Worker: 非対応ブラウザです';
        return;
      }
      try {
        const reg = await navigator.serviceWorker.register('./sw.js');
        await navigator.serviceWorker.ready;
        swReady = true;
        statusEl.textContent = 'Service Worker: 準備完了';
      } catch (e) {
        statusEl.textContent = 'Service Worker エラー: ' + e.message;
        console.error(e);
      }
    }

    let swReady = false;

    function loadProject(arrayBuffer) {
      const controller = navigator.serviceWorker.controller;
      if (!controller) {
        statusEl.textContent = 'リロードしてください（Service Workerが有効になります）';
        return;
      }
      controller.postMessage({ type: 'store', data: arrayBuffer }, [arrayBuffer]);

      const projectUrl = encodeURIComponent(location.origin + VIRTUAL_PATH);
      iframe.src = `${TURBOWARP_EMBED}?project_url=${projectUrl}&autoplay=true`;
    }

    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const arrayBuffer = await file.arrayBuffer();

      // ここで .sb3 編集処理を挟める
      // const zip = await JSZip.loadAsync(arrayBuffer);
      // zip.file("project.json", modifiedJson);
      // const newBuffer = await zip.generateAsync({ type: 'arraybuffer' });
      // loadProject(newBuffer);

      loadProject(arrayBuffer);
    });

    initSW();
  </script>
</body>
</html>
