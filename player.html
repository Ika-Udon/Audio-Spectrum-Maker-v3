<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; align-items: center; width: 100%; height: 100vh; overflow: hidden; }
    canvas { display: block; }
    #status { color: #fff; font-family: sans-serif; font-size: 14px; }
  </style>
</head>
<body>
  <div id="status">プロジェクトを待機中...</div>
  <canvas id="scratch-stage" width="480" height="360" style="display:none;"></canvas>

  <script src="./scratch-render.min.js"></script>
  <script src="./scratch-vm.js"></script>
  <script>
    const canvas = document.getElementById('scratch-stage');
    const status = document.getElementById('status');

    let vm = null;
    let renderer = null;

    function init() {
      renderer = new ScratchRender(canvas);
      vm = new VirtualMachine();
      vm.attachRenderer(renderer);
      vm.start();
    }

    async function loadProject(arrayBuffer) {
      if (!vm) init();

      status.textContent = '読み込み中...';
      canvas.style.display = 'none';

      try {
        await vm.loadProject(arrayBuffer);
        status.style.display = 'none';
        canvas.style.display = 'block';
        vm.greenFlag();
      } catch (e) {
        status.textContent = 'エラー: ' + e.message;
        console.error(e);
      }
    }

    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'load' && e.data.data) {
        loadProject(e.data.data);
      }
    });
  </script>
</body>
</html>
